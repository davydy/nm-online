<head>

    <title>nomo engine | mega template</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Handlebars Motor -->
    <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Configuração do Tailwind (Interface) -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { bg: '#09090b', panel: '#18181b', border: '#27272a', text: '#f4f4f5', muted: '#a1a1aa' },
                        light: { bg: '#f4f4f5', panel: '#ffffff', border: '#e4e4e7', text: '#18181b', muted: '#52525b' },
                        brand: { purple: '#a855f7', magenta: '#d946ef' }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        
        .text-metallic {
            background: linear-gradient(135deg, #a855f7 0%, #e879f9 50%, #c084fc 100%);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        html.dark ::-webkit-scrollbar-track { background: #09090b; }
        html.dark ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
        html.dark ::-webkit-scrollbar-thumb:hover { background: #a855f7; }
        html:not(.dark) ::-webkit-scrollbar-track { background: #f4f4f5; }
        html:not(.dark) ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 4px; }
        html:not(.dark) ::-webkit-scrollbar-thumb:hover { background: #a855f7; }

        .form-input {
            width: 100%; border-radius: 0.5rem; border: 1px solid; padding: 0.5rem 0.75rem;
            font-size: 0.875rem; outline: none; transition: all 0.2s;
        }
        html.dark .form-input { background: #09090b; border-color: #27272a; color: #f4f4f5; }
        html.dark .form-input:focus { border-color: #a855f7; box-shadow: 0 0 0 2px rgba(168,85,247,0.2); }
        html:not(.dark) .form-input { background: #ffffff; border-color: #e4e4e7; color: #18181b; }
        html:not(.dark) .form-input:focus { border-color: #a855f7; box-shadow: 0 0 0 2px rgba(168,85,247,0.2); }

        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }

        #preview-wrapper { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); margin: 0 auto; }
        
        .toast {
            position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 8px;
            color: white; font-size: 14px; font-weight: 500; opacity: 0; transform: translateY(20px);
            transition: all 0.3s ease; z-index: 1000; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden bg-light-bg dark:bg-dark-bg text-light-text dark:text-dark-text transition-colors duration-300">

    <!-- Header Nomo Engine -->

        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black tracking-widest text-metallic lowercase select-none">nomo engine</h1>
            <span class="px-2 py-1 bg-brand-purple/10 text-brand-purple text-[10px] font-bold uppercase rounded-md tracking-widest">Mega Builder</span>
        </div>

        <div class="flex gap-4 items-center">
            <button id="btn-theme" class="w-10 h-10 rounded-full flex items-center justify-center bg-light-bg dark:bg-dark-bg border border-light-border dark:border-dark-border text-light-muted dark:text-dark-muted hover:text-brand-purple transition-all shadow-sm">
                <i class="fas fa-sun dark:hidden"></i>
                <i class="fas fa-moon hidden dark:block"></i>
            </button>

            <div class="w-px h-8 bg-light-border dark:bg-dark-border mx-2"></div>

            <div class="flex bg-light-bg dark:bg-dark-bg border border-light-border dark:border-dark-border rounded-lg overflow-hidden shadow-sm">
                <button id="btn-desktop" class="px-4 py-2 text-brand-purple bg-light-border/50 dark:bg-dark-border/50 transition-colors">
                    <i class="fas fa-desktop"></i>
                </button>
                <button id="btn-mobile" class="px-4 py-2 text-light-muted dark:text-dark-muted hover:text-brand-purple transition-colors">
                    <i class="fas fa-mobile-alt"></i>
                </button>
            </div>

            <button id="btn-gerar" class="bg-light-bg dark:bg-dark-bg hover:border-brand-purple text-light-text dark:text-dark-text px-6 py-2 rounded-lg text-sm font-semibold transition-all border border-light-border dark:border-dark-border flex items-center gap-2 shadow-sm">
                <i class="fas fa-sync-alt text-brand-purple"></i> Forçar Render
            </button>
            
            <button id="btn-baixar" class="bg-gradient-to-r from-brand-purple to-brand-magenta hover:brightness-110 text-white px-6 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-2 shadow-md">
                <i class="fas fa-download"></i> Exportar Site
            </button>
        </div>
    </header>

    <!-- Layout Principal -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- PAINEL ESQUERDO (DADOS JSON E FORMULÁRIO) -->
        <section class="w-[35%] flex flex-col border-r border-light-border dark:border-dark-border bg-light-bg dark:bg-dark-bg z-10 relative transition-colors duration-300 min-w-[380px]">
            
            <!-- Tabs Headers -->
            <div class="flex border-b border-light-border dark:border-dark-border bg-light-panel dark:bg-dark-panel transition-colors duration-300">
                <button class="tab-left active flex-1 py-3 text-xs uppercase tracking-widest font-bold border-b-2 border-brand-purple text-brand-purple transition-colors flex justify-center items-center gap-2" data-target="tab-form">
                    <i class="fas fa-sliders-h"></i> Painel Visual
                </button>
                <button class="tab-left flex-1 py-3 text-xs uppercase tracking-widest font-bold border-b-2 border-transparent text-light-muted dark:text-dark-muted hover:text-light-text dark:hover:text-dark-text transition-colors flex justify-center items-center gap-2" data-target="tab-json">
                    <i class="fas fa-code"></i> Injetar JSON
                </button>
            </div>

            <!-- Tab Content: Formulário Visual -->
            <div id="tab-form" class="flex-1 overflow-y-auto p-5 tab-pane-left bg-light-bg dark:bg-dark-bg">
                <div class="text-[11px] text-light-muted dark:text-dark-muted mb-4 px-2 bg-brand-purple/5 p-3 rounded-lg border border-brand-purple/20">
                    <i class="fas fa-info-circle text-brand-purple mr-1"></i> As seções de <b>Jornada, FAQ, Blog, E-book e Segurança</b> são geradas automaticamente com o Copywriting Padrão de Luxo da Nomo para economizar tokens da IA.
                </div>
                <!-- O Formulário Dinâmico será renderizado aqui -->
                <div id="dynamic-form-container" class="space-y-3 pb-10"></div>
            </div>

            <!-- Tab Content: Raw JSON -->
            <div id="tab-json" class="flex-1 hidden flex-col overflow-hidden tab-pane-left bg-light-panel dark:bg-dark-panel">
                <div class="p-3 border-b border-light-border dark:border-dark-border flex justify-between items-center text-xs">
                    <span class="text-light-muted dark:text-dark-muted">Cole o JSON gerado pela IA</span>
                    <button id="btn-sync-to-form" class="bg-brand-purple/10 text-brand-purple px-3 py-1.5 rounded hover:bg-brand-purple/20 transition-colors font-bold uppercase tracking-wider text-[10px]">
                        <i class="fas fa-magic mr-1"></i> Preencher Painel
                    </button>
                </div>
                <textarea id="json-input" class="flex-1 w-full bg-transparent text-brand-purple dark:text-[#A78BFA] font-mono text-[12px] p-5 outline-none resize-none leading-relaxed" spellcheck="false" placeholder="Cole o código JSON aqui..."></textarea>
            </div>
        </section>

        <!-- PAINEL DIREITO (OUTPUT) -->
        <section class="w-[65%] bg-[#e5e5e5] dark:bg-[#050505] relative flex flex-col transition-colors duration-300">
            
            <!-- Tabs Headers Output -->
            <div class="flex border-b border-light-border dark:border-dark-border bg-light-panel dark:bg-dark-panel z-20 transition-colors duration-300">
                <button class="tab-right active flex-1 py-3 text-xs uppercase tracking-widest font-bold border-b-2 border-brand-purple text-brand-purple transition-colors flex justify-center items-center gap-2" data-target="out-preview">
                    <i class="fas fa-eye"></i> Visualizador Live
                </button>
                <button class="tab-right flex-1 py-3 text-xs uppercase tracking-widest font-bold border-b-2 border-transparent text-light-muted dark:text-dark-muted hover:text-light-text dark:hover:text-dark-text transition-colors flex justify-center items-center gap-2" data-target="out-code">
                    <i class="fas fa-html5"></i> Ver Código Gerado
                </button>
            </div>

            <!-- Output: Iframe Preview -->
            <div id="out-preview" class="flex-1 relative flex flex-col overflow-hidden justify-center items-center tab-pane-right">
                <div id="preview-wrapper" class="w-full h-full bg-white dark:bg-black shadow-2xl relative border-x border-light-border dark:border-dark-border overflow-hidden">
                    <iframe id="preview-frame" class="w-full h-full border-none absolute inset-0 bg-white"></iframe>
                </div>
            </div>

            <!-- Output: Código HTML Fonte -->
            <div id="out-code" class="flex-1 hidden relative flex-col tab-pane-right bg-light-panel dark:bg-dark-panel">
                <button id="btn-copy-code" class="absolute top-4 right-6 z-30 bg-brand-purple hover:bg-brand-magenta text-white px-5 py-2.5 rounded-lg text-xs uppercase tracking-widest font-bold shadow-lg transition-all flex items-center gap-2">
                    <i class="fas fa-copy"></i> Copiar HTML
                </button>
                <textarea id="html-code-view" class="flex-1 w-full bg-transparent text-light-muted dark:text-dark-muted font-mono text-[12px] p-6 pt-16 outline-none resize-none leading-relaxed" spellcheck="false" readonly placeholder="O código HTML final aparecerá aqui..."></textarea>
            </div>
        </section>
    </main>

    <!-- Modal Toast -->
    <div id="toast-msg" class="toast bg-green-500"></div>

    <!-- ========================================================================= -->
    <!-- MASTER TEMPLATE BLINDADO (15 SEÇÕES) -->
    <!-- ========================================================================= -->
    <template id="master-template">

            return `
                <div>
                    <label class="block text-xs font-semibold text-light-muted dark:text-dark-muted mb-1">${label}</label>
                    ${inputHtml}
                </div>
            `;
        }

        function renderForm() {
            let html = "";

            // 1. CORES
            let colorContent = `
                <div class="grid grid-cols-2 gap-4">
                    ${renderColorSwatch('Fundo Principal', 'cor_fundo', appData.configuracao.paleta.cor_fundo)}
                    ${renderColorSwatch('Fundo Cards', 'cor_card', appData.configuracao.paleta.cor_card)}
                    ${renderColorSwatch('Destaque Ouro', 'cor_destaque', appData.configuracao.paleta.cor_destaque)}
                    ${renderColorSwatch('Cor Texto', 'cor_texto', appData.configuracao.paleta.cor_texto)}
                </div>
            `;
            html += createAccordion('Identidade Visual', 'fas fa-palette', colorContent, true);

            // 2. PROFISSIONAL
            let profContent = `
                ${renderTextInput('Nome Médico', 'profissional', 'nome_completo', appData.profissional.nome_completo)}
                ${renderTextInput('Especialidade', 'profissional', 'especialidade', appData.profissional.especialidade)}
                <div class="grid grid-cols-2 gap-4">
                    ${renderTextInput('CRM / RQE', 'profissional', 'crm', appData.profissional.crm)}
                    ${renderTextInput('Nome do Local', 'profissional', 'local_nome', appData.profissional.local_nome)}
                </div>
                ${renderTextInput('Frase Impacto', 'profissional', 'frase_impacto', appData.profissional.frase_impacto, true)}
                ${renderTextInput('Biografia', 'profissional', 'bio_completa', appData.profissional.bio_completa, true)}
            `;
            html += createAccordion('Dados do Médico', 'fas fa-user-md', profContent);

            // 3. HERO
            let heroContent = `
                ${renderTextInput('Headline', 'hero', 'headline', appData.hero.headline, true)}
                ${renderTextInput('Subheadline', 'hero', 'subheadline', appData.hero.subheadline, true)}
            `;
            html += createAccordion('Início (Hero)', 'fas fa-image', heroContent);

            // 4. SERVIÇOS
            let servContent = `<div id="services-list" class="space-y-4">`;
            appData.servicos.forEach((srv, index) => {
                servContent += `
                    <div class="bg-light-bg dark:bg-[#09090b] p-4 rounded-lg border border-light-border dark:border-dark-border relative group">
                        <button onclick="removeService(${index})" class="absolute top-2 right-2 text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1"><i class="fas fa-trash text-xs"></i></button>
                        <input type="text" value="${srv.titulo}" class="w-full bg-transparent font-bold text-sm mb-2 outline-none border-b border-transparent focus:border-brand-purple" oninput="updateService(${index}, 'titulo', this.value)">
                        <textarea class="w-full bg-transparent text-xs text-light-muted dark:text-dark-muted outline-none resize-none" rows="2" oninput="updateService(${index}, 'descricao', this.value)">${srv.descricao}</textarea>
                    </div>
                `;
            });
            servContent += `</div><button onclick="addService()" class="w-full py-2 border border-dashed border-brand-purple/50 text-brand-purple rounded-lg text-xs font-bold uppercase tracking-widest hover:bg-brand-purple/10 transition-colors mt-2">+ Serviço</button>`;
            html += createAccordion('Procedimentos', 'fas fa-list', servContent);

            // 5. PROVA SOCIAL
            let provaContent = `
                ${renderTextInput('Depoimento', 'prova_social', 'depoimento_texto', appData.prova_social.depoimento_texto, true)}
                <div class="grid grid-cols-2 gap-4">
                    ${renderTextInput('Autor', 'prova_social', 'autor', appData.prova_social.autor)}
                    ${renderTextInput('Procedimento', 'prova_social', 'detalhe_procedimento', appData.prova_social.detalhe_procedimento)}
                </div>
            `;
            html += createAccordion('Depoimento', 'fas fa-quote-right', provaContent);

            // 6. CONTATO
            let contatoContent = `
                ${renderTextInput('Link WhatsApp', 'contato', 'whatsapp_link', appData.contato.whatsapp_link)}
                ${renderTextInput('Endereço', 'contato', 'endereco_completo', appData.contato.endereco_completo)}
            `;
            html += createAccordion('Contato & Mapa', 'fas fa-map-marker-alt', contatoContent);

            dynamicFormContainer.innerHTML = html;
        }

        // FUNÇÕES DE ATUALIZAÇÃO
        window.updateColor = function(key, val) {
            appData.configuracao.paleta[key] = val;
            let hexInput = document.getElementById(`hex_${key}`);
            if(hexInput) hexInput.value = val.toUpperCase();
            syncJsonInput(); debounceRender();
        }
        window.updateField = function(objKey, fieldKey, val) {
            appData[objKey][fieldKey] = val;
            syncJsonInput(); debounceRender();
        }
        window.updateService = function(index, key, val) {
            appData.servicos[index][key] = val;
            syncJsonInput(); debounceRender();
        }
        window.addService = function() {
            appData.servicos.push({ titulo: "Novo Serviço", descricao: "Descrição...", imagem_url: "" });
            renderForm(); syncJsonInput(); debounceRender();
        }
        window.removeService = function(index) {
            appData.servicos.splice(index, 1);
            renderForm(); syncJsonInput(); debounceRender();
        }

        function syncJsonInput() { jsonInput.value = JSON.stringify(appData, null, 4); }

        btnSyncToForm.addEventListener('click', () => {
            try {
                let clean = jsonInput.value.trim();
                if (clean.startsWith('```json')) clean = clean.replace(/```json/gi, '');
                if (clean.endsWith('```')) clean = clean.replace(/```/g, '');
                clean = clean.replace(/[\u00A0\u1680\u180e\u2000-\u200a\u2028\u2029\u202f\u205f\u3000]/g, ' ').trim();
                
                appData = JSON.parse(clean);
                renderForm();
                jsonInput.value = JSON.stringify(appData, null, 4);
                compileTemplate();
                showToast('Painel Preenchido com Sucesso!');
                document.querySelector('[data-target="tab-form"]').click();
            } catch (e) {
                showToast('Erro no JSON. Verifique aspas e chaves.', true);
            }
        });

        // O Motor de Compilação
        let htmlGerado = "";
        function compileTemplate() {
            try {
                const source = document.getElementById('master-template').innerHTML;
                const template = Handlebars.compile(source);
                htmlGerado = template(appData);
                previewFrame.srcdoc = htmlGerado;
                htmlCodeView.value = htmlGerado;
            } catch (error) { console.error(error); }
        }

        btnGerar.addEventListener('click', () => { compileTemplate(); showToast('Forçado Atualizado'); });

        btnCopyCode.addEventListener('click', () => {
            if(!htmlGerado) return;
            htmlCodeView.select(); document.execCommand('copy'); window.getSelection().removeAllRanges();
            const original = btnCopyCode.innerHTML;
            btnCopyCode.innerHTML = '<i class="fas fa-check"></i> Copiado!';
            btnCopyCode.classList.replace('bg-brand-purple', 'bg-green-600');
            setTimeout(() => { btnCopyCode.innerHTML = original; btnCopyCode.classList.replace('bg-green-600', 'bg-brand-purple'); }, 2000);
        });

        btnBaixar.addEventListener('click', () => {
            if (!htmlGerado) return;
            let nomeArquivo = "nomo_site.html";
            if(appData.profissional && appData.profissional.nome_completo) {
                nomeArquivo = appData.profissional.nome_completo.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '') + ".html";
            }
            const blob = new Blob([htmlGerado], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = nomeArquivo;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('Download iniciado!');
        });

        function setupTabs(btnSelector, paneSelector, activeClass) {
            const btns = document.querySelectorAll(btnSelector);
            const panes = document.querySelectorAll(paneSelector);
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => { b.classList.remove('active', activeClass, 'text-brand-purple'); b.classList.add('border-transparent', 'text-light-muted', 'dark:text-dark-muted'); });
                    panes.forEach(p => { p.classList.add('hidden'); p.classList.remove('flex'); });
                    btn.classList.add('active', activeClass, 'text-brand-purple'); btn.classList.remove('border-transparent', 'text-light-muted', 'dark:text-dark-muted');
                    document.getElementById(btn.dataset.target).classList.remove('hidden'); document.getElementById(btn.dataset.target).classList.add('flex');
                });
            });
        }
        setupTabs('.tab-left', '.tab-pane-left', 'border-brand-purple');
        setupTabs('.tab-right', '.tab-pane-right', 'border-brand-purple');

        btnTheme.addEventListener('click', () => htmlElement.classList.toggle('dark'));
        btnMobile.addEventListener('click', () => { previewWrapper.style.width = '375px'; btnMobile.classList.replace('text-light-muted', 'text-brand-purple'); btnMobile.classList.replace('dark:text-dark-muted', 'bg-light-border/50'); btnDesktop.classList.replace('text-brand-purple', 'text-light-muted'); btnDesktop.classList.remove('bg-light-border/50', 'dark:bg-dark-border/50'); });
        btnDesktop.addEventListener('click', () => { previewWrapper.style.width = '100%'; btnDesktop.classList.replace('text-light-muted', 'text-brand-purple'); btnDesktop.classList.add('bg-light-border/50', 'dark:bg-dark-border/50'); btnMobile.classList.replace('text-brand-purple', 'text-light-muted'); btnMobile.classList.remove('bg-light-border/50', 'dark:bg-dark-border/50'); });

        renderForm(); setTimeout(compileTemplate, 300);
    </script>
</body>
</html>
